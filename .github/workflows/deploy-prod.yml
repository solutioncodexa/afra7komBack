name: Build and Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Prepare runtime artifacts
        run: |
          cp target/afra7kom-backend-*.jar app.jar
          chmod +x deploy/deploy-backend.sh

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.jar,Dockerfile.runtime,deploy/deploy-backend.sh"
          target: "/home/debian/afra7kom/afra7kombackend"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cp ~/afra7kom/afra7kombackend/deploy/deploy-backend.sh ~/afra7kom/deploy-backend.sh
            chmod +x ~/afra7kom/deploy-backend.sh
            ~/afra7kom/deploy-backend.sh
